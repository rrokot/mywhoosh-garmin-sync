<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyWhoosh -> Garmin</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: #f5f7fa;
        color: #1e2a36;
      }

      .wrap {
        width: 280px;
        padding: 12px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }

      .btn {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 8px;
      }

      .btn-primary {
        background: #1565c0;
        color: #fff;
      }

      .btn-secondary {
        background: #263238;
        color: #fff;
      }

      .btn-light {
        background: #dfe7ef;
        color: #1a2a39;
      }

      .hint {
        font-size: 11px;
        color: #4f6275;
        margin-top: 4px;
      }

      .status {
        font-size: 11px;
        margin-top: 8px;
        min-height: 14px;
        color: #1f4d7a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>MyWhoosh -> Garmin</h1>
      <button id="btn-new" class="btn btn-primary">Upload New Activities</button>
      <button id="btn-latest" class="btn btn-secondary">Upload Latest Activity</button>
      <button id="btn-copy-logs" class="btn btn-light">Copy Debug Logs</button>
      <div class="hint">Open MyWhoosh activities tab before running.</div>
      <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
