<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyWhoosh -> Garmin</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-row">
          <div class="hero-copy-block">
            <h1>MyWhoosh -> Garmin</h1>
          </div>
          <span id="state-badge" class="badge badge-neutral">Checking</span>
        </div>
        <p id="state-copy" class="hero-copy" aria-live="polite">Checking current state...</p>
        <p id="state-meta" class="hero-meta">Checking tab...</p>
      </section>

      <section class="panel panel-main">
        <div class="action-grid">
          <button id="btn-new" class="action action-primary">
            <span class="action-title">Sync</span>
            <span class="action-copy">All unseen</span>
          </button>
        </div>
        <div class="status-surface">
          <p id="action-status" class="action-status" aria-live="polite"></p>
          <p id="progress-copy" class="panel-copy">No sync running.</p>
          <p id="progress-meta" class="panel-meta"></p>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <span class="metric-label">Processed</span>
            <strong id="metric-progress" class="metric-value">--</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Uploaded</span>
            <strong id="metric-uploaded" class="metric-value">--</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Duplicate</span>
            <strong id="metric-duplicate" class="metric-value">--</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Failed</span>
            <strong id="metric-failed" class="metric-value">--</strong>
          </div>
        </div>
        <div class="utility-grid">
          <button id="btn-copy-logs" class="utility-btn">Copy Debug Logs</button>
          <button id="btn-clear-cache" class="utility-btn utility-btn-secondary">Clear Cache</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
